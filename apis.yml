aid: essity
name: Essity
description: >-
  Essity is a Swedish-headquartered global hygiene and health company operating
  across four business areas: Health & Medical, Personal Care, Consumer Tissue,
  and Professional Hygiene. The company is listed on Nasdaq Stockholm (ESSITY)
  and owns roughly 40 brands including TENA (incontinence care), Tork
  (professional hygiene), Libero (baby diapers), Libresse / Bodyform / Nana /
  Saba / Nuvenia / Libra (feminine care), Modibodi and Knix (period underwear),
  JOBST (compression hosiery), Leukoplast (adhesive bandages), Cutimed,
  Sorbact, Hydrofera and Actimove (wound care, sports medicine, orthopedic
  supports), Delta-Cast (casting), and consumer tissue brands Lotus, Zewa,
  Tempo, Cushelle, Plenty, Velvet, Regio, Sorbent and Purex. No public
  developer-facing APIs or developer portal have been identified for Essity;
  this repository tracks corporate, brand, sustainability, investor, and
  integration surfaces for ongoing API discovery. The company's Tork brand
  ships a connected washroom data platform — Tork Vision Cleaning — which is
  the closest thing to a public data surface in the portfolio.
